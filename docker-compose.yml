version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: yikeyue-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yikeyue
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: yikeyue-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Application Services (Production/Deployment Example)
  # Both services share the same Dockerfile/image but run different commands.
  # ---------------------------------------------------------------------------
  # server:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   command: pnpm dev:server
  #   ports:
  #     - "3000:3000"
