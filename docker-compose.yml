  #     - DATABASE_URL=postgres://postgres:postgres@postgres:5432/yikeyue
  #     - REDIS_URL=redis://redis:6379/0
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy

  # worker:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   command: pnpm dev:worker
  #   environment:
  #     - DATABASE_URL=postgres://postgres:postgres@postgres:5432/yikeyue
